  <g id="text_22">
   <text style="fill: #555555; font: 8px 'DejaVu Sans'; text-anchor: start" x="43.78125" y="276.197969" transform="rotate(-0 43.78125 276.197969)">Shannon entropy of the light's per-day mode distribution, normalised by log(5)=1.61. A day with only idle = 0. A day mixing all 5 modes evenly = 1.0. The jump on Mar 3 is the day the V6 software deployed with the AWARE mode in the code; the data starts to record it from Mar 15.</text>
