  <g id="text_27">
   <text style="fill: #555555; font: 8px 'DejaVu Sans'; text-anchor: start" x="46.064219" y="251.285969" transform="rotate(-0 46.064219 251.285969)">The single surviving meta-tuning review (Feb 13, 8 h after the V4 tuner went live): every parameter was pinned against a wall. Memory was floor-clamped 100% of the time; 7 of 12 parameters were at their floor or ceiling over 96% of the time. The review's response: raise 4 homes, drop 3 ceilings, raise 5 floors, and tighten the budget. The fixes are visible in the same-week trajectory (G1).</text>
